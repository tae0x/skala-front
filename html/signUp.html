<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
  </head>
  <body>
    <h2>👤 회원가입</h2>

    <p>SKALA FRONT 회원가입을 환영합니다.</p>

    <form action="signUpResult.html" method="get">
      <fieldset>
        <legend>기본 정보</legend>

        <p>
          <label for="id">아이디 :</label>
          <input
            type="text"
            id="id"
            name="id"
            placeholder="5~20자 영문/숫자"
            required
          />
          <input type="button" value="중복확인" />
        </p>

        <p>
          <label for="pw">비밀번호 :</label>
          <input
            type="password"
            id="pw"
            name="password"
            placeholder="8자리 이상"
            required
          />
        </p>

        <p>
          <label for="email">이메일 :</label>

          <input
            type="email"
            id="email"
            name="email"
            placeholder="example@email.com"
            required
          />

          @

          <select name="domain">
            <option>naver.com</option>
            <option>gmail.com</option>
            <option>daum.net</option>
            <option>직접입력</option>
          </select>
        </p>
      </fieldset>

      <br />

      <fieldset>
        <legend>개인 프로필 정보</legend>

        <p>
          <label for="name">이름 :</label>
          <input type="text" id="name" name="name" required />
        </p>

        <p>
          <label for="birth">생년월일 :</label>
          <input type="date" id="birth" name="birth" />
        </p>

        <p>
          <label>성별 :</label>

          <input type="radio" id="male" name="gender" value="male" />
          <label for="male">남성</label>

          <input type="radio" id="female" name="gender" value="female" />
          <label for="female">여성</label>

          <input type="radio" id="none" name="gender" value="none" />
          <label for="none">선택안함</label>
        </p>

        <p>관심 분야 (중복 선택 가능)</p>

        <input type="checkbox" id="html" name="interest" value="html" />
        <label for="html">웹 프로그래밍 (HTML)</label>

        <input type="checkbox" id="uiux" name="interest" value="uiux" />
        <label for="uiux">UI/UX 디자인</label>

        <input type="checkbox" id="database" name="interest" value="database" />
        <label for="database">데이터베이스</label>

        <input type="checkbox" id="network" name="interest" value="network" />
        <label for="network">네트워크</label>
        <br /><br />

        <label for="route">가입 경로 :</label>

        <select id="route" name="route">
          <option>학교 수업</option>
          <option>인터넷 검색</option>
          <option>지인 추천</option>
          <option>SNS</option>
        </select>
      </fieldset>

      <br />

      <fieldset>
        <legend>자기소개</legend>

        <p>나를 표현하는 한 줄 소개 또는 가입 인사</p>

        <textarea
          name="intro"
          rows="5"
          cols="40"
          placeholder="간단한 자기소개를 작성해 주세요."
        ></textarea>
      </fieldset>

      <br />

      <button type="submit">회원가입</button>
      <button type="reset">다시입력</button>
    </form>
  </body>
</html>
